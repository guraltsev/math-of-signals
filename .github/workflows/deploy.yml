name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: autorun-extension/package.json

      - name: Build the autorun extension
        run: |
          cd autorun-extension
          npm install
          npm run build
          python -m jupyter labextension build .

      - name: Build the JupyterLite site
        run: |
          jupyter lite build

      - name: Build the bundled Pyodide distribution
        run: |
          python scripts/build_custom_pyodide.py --output-dir dist/pyodide

      - name: Patch runtime config for GitHub Pages
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            SITE_URL="https://$OWNER.github.io/"
          else
            SITE_URL="https://$OWNER.github.io/$REPO/"
          fi
          python scripts/patch_runtime_config.py --config dist/jupyter-lite.json --site-url "$SITE_URL"

      - name: Prepare Pages artifact
        run: |
          cp .nojekyll dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
